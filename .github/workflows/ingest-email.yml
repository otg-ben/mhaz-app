name: Ingest MHAZ Group Emails

on:
  schedule:
    # Every 10 minutes, 5am–11pm Pacific (12:00–06:00 UTC, split across midnight)
    - cron: '*/10 12-23 * * *'   # noon–midnight UTC  (5am–5pm PT)
    - cron: '*/10 0-5 * * *'     # midnight–6am UTC   (5pm–11pm PT)
    # Every hour during overnight PT (11pm–5am = 6am–12pm UTC)
    - cron: '0 6-11 * * *'
  workflow_dispatch:              # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://mhaz-app.vercel.app/api/cron/ingest-email")
          echo "HTTP $STATUS"
          cat /tmp/response.json
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ] || exit 1
